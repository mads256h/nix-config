name: Update flake.lock

on:
  schedule:
    # Every Friday at 06:00 UTC — adjust to taste
    - cron: '0 6 * * 5'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT }}
          commit-message: "flake.lock: update inputs"
          title: "flake.lock: update inputs"
          body: |
            Automated update of flake inputs via `nix flake update`.

            Triggered by the scheduled `update-flake-lock` workflow.
          branch: update-flake-lock
          delete-branch: true
          labels: |
            dependencies
