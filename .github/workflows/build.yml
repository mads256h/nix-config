name: Build & Boot NixOS VMs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  vm-boot-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [desktop-mads, laptop-mads, server-mads]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://mads256h.cachix.org https://nix-community.cachix.org https://hyprland.cachix.org
            extra-trusted-public-keys = mads256h.cachix.org-1:6kAAfDlu6DSFqADoOQzlkOPQKO1hoptBHgnJGnuEnkI= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc=
      
      - uses: cachix/cachix-action@v17
        with:
          name: mads256h
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Re-add other Cachix caches (cachix-action overwrites substituters)
        run: |
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf <<'EOF'
            extra-substituters = https://nix-community.cachix.org https://hyprland.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc=
          EOF

      - name: Show effective Nix config
        run: nix show-config | grep -iE 'substitut|trusted'

      - name: Enable /dev/kvm
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build toplevel system closure
        run: nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" -L -o result-toplevel --fallback

      - name: Write toplevel metadata
        run: |
          mkdir -p ci-artifacts
          PR_TOPLEVEL="$(readlink -f result-toplevel)"
          {
            echo "host=${{ matrix.host }}"
            echo "toplevel=$PR_TOPLEVEL"
          } > "ci-artifacts/toplevel-${{ matrix.host }}.txt"

      - name: Download master toplevel artifact
        if: github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          branch: master
          event: push
          name: toplevel-${{ matrix.host }}
          path: base-artifact
          if_no_artifact_found: warn

      - name: Generate nvd diff
        if: github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action)
        run: |
          PR_TOPLEVEL="$(readlink -f result-toplevel)"
          BASE_FILE="base-artifact/toplevel-${{ matrix.host }}.txt"
          if [ ! -f "$BASE_FILE" ]; then
            echo "No master toplevel artifact found for ${{ matrix.host }}. Skipping nvd comparison." | tee "ci-artifacts/nvd-${{ matrix.host }}.txt"
            exit 0
          fi

          BASE_TOPLEVEL="$(sed -n 's/^toplevel=//p' "$BASE_FILE" | head -n1)"
          if [ -z "$BASE_TOPLEVEL" ]; then
            echo "Master toplevel artifact for ${{ matrix.host }} did not contain a toplevel path. Skipping nvd comparison." | tee "ci-artifacts/nvd-${{ matrix.host }}.txt"
            exit 0
          fi

          nix-store --realise "$BASE_TOPLEVEL" >/dev/null
          nix shell nixpkgs#nvd --command nvd diff "$BASE_TOPLEVEL" "$PR_TOPLEVEL" | tee "ci-artifacts/nvd-${{ matrix.host }}.txt"

      - name: Upload toplevel build artifact
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action))
        uses: actions/upload-artifact@v4
        with:
          name: toplevel-${{ matrix.host }}
          path: ci-artifacts/

      - name: Comment nvd diff on pull request
        if: github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action)
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const host = '${{ matrix.host }}';
            const marker = `<!-- nvd-diff:${host} -->`;
            let diff = fs.readFileSync(`ci-artifacts/nvd-${host}.txt`, 'utf8').trim();
            if (!diff) diff = 'No differences detected.';
            if (diff.length > 60000) diff = `${diff.slice(0, 60000)}\n... (truncated)`;
            const body = `${marker}\n## nvd diff for \`${host}\`\n\`\`\`diff\n${diff}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Build VM
        run: nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.vm" -L -o result --fallback

      - name: Boot VM and check for sucessful boot
        run: |
          set -o pipefail
          RUNSCRIPT=$(ls result/bin/run-*-vm)
          QEMU_OPTS="-no-reboot" timeout 180 "$RUNSCRIPT" | tee vm.log

          if ! grep -q "CI_BOOT_OK" vm.log; then
            echo "VM did not reach the boot-success checkpoint."
            exit 1
          fi

          if grep -q "CI_UNITS_FAILED" vm.log; then
            echo "One or more systemd units failed to start. See below:"
            sed -n '/CI_UNITS_FAILED/,/CI_BOOT_OK/p' vm.log
            exit 1
          fi

          if grep -q "CI_HYPR_NOT_STARTED" vm.log; then
            echo "Hyprland never started."
            exit 1
          fi

          if grep -q "CI_HYPR_ERRORS_FOUND" vm.log; then
            echo "Hyprland logged errors:"
            sed -n '/CI_HYPR_ERRORS_FOUND/,/CI_BOOT_OK/p' vm.log
            exit 1
          fi

          echo "Boot, units, and Hyprland all clean."

